{% extends 'base.html' %}
{% block title %}Restore Database{% endblock %}
{% block content %}
<h2>Restore Database</h2>
<form method="post" enctype="multipart/form-data">
    {% csrf_token %}
    <input type="file" name="dbfile" />
    <button type="submit" class="btn">Upload and Restore</button>
</form>
{% endblock %}
