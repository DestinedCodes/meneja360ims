{% extends 'base.html' %}
{% block title %}Set New Password{% endblock %}
{% block content %}
<div class="container mt-5">
  <h2>Set a new password</h2>
  <form method="post">{% csrf_token %}
    {{ form.as_p }}
    <button class="btn btn-primary" type="submit">Change password</button>
  </form>
</div>
{% endblock %}
