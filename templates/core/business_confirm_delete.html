{% extends 'base.html' %}
{% block title %}Delete Business{% endblock %}
{% block content %}
<div class="card" style="max-width:600px;margin:2rem auto;">
  <div class="card-body">
    <h3>Delete Business</h3>
    <p>Are you sure you want to delete business: <strong>{{ object.name }}</strong>?</p>
    <form method="post">{% csrf_token %}
      <button class="btn btn-danger" type="submit">Yes, delete</button>
      <a href="{% url 'business_list' %}" class="btn btn-secondary">Cancel</a>
    </form>
  </div>
</div>
{% endblock %}
