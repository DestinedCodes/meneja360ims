{% extends 'base.html' %}
{% block title %}Change Password{% endblock %}
{% block content %}
<div class="container mt-5">
  <h2>Change Password</h2>
  <form method="post">{% csrf_token %}
    {{ form.as_p }}
    <button class="btn btn-primary" type="submit">Save new password</button>
  </form>
</div>
{% endblock %}
