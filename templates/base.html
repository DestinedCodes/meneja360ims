<!DOCTYPE html>
<html lang="en">
<head>
    {% load static %}
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}CyberPoa{% endblock %}</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>
<body>
    {% if user.is_authenticated %}
    <div class="navbar">
        <a href="{% url 'dashboard' %}" style="color:inherit;text-decoration:none;">CyberPoa</a>
        <div class="nav-links">
            <a href="{% url 'dashboard' %}">Dashboard</a>
            <a href="{% url 'client_list' %}">Clients</a>
            <a href="{% url 'transaction_list' %}">Transactions</a>
            <a href="{% url 'expense_list' %}">Expenses</a>
            <a href="{% url 'report_index' %}">Reports</a>
            <a href="{% url 'business_list' %}">Business</a>
        </div>
        <a href="{% url 'logout' %}" class="logout-link">Logout</a>
    </div>
    {% endif %}
    <div class="container{% if not user.is_authenticated %}-fluid{% endif %}">
        {% if messages %}
            <div class="messages">
                {% for message in messages %}
                    <div class="alert alert-{{ message.tags }} alert-dismissible fade show" role="alert">
                        {{ message }}
                        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                    </div>
                {% endfor %}
            </div>
        {% endif %}
        {% block content %}{% endblock %}
    </div>
    <!-- Bootstrap 5 JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
